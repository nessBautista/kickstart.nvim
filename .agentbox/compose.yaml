# Generated by agentbox CLI
# Mode: devbox
# Stack: python

services:
  ai-box:
    build:
      context: ..
      dockerfile: .agentbox/Dockerfile
    container_name: nvim-ai-box
    working_dir: /workspace
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_TOKEN:-}
    ports:
      # SSH Access
      - "2220:22"
    volumes:
      # Workspace (bind mount)
      - ..:/workspace

      # Volume Masking: Keep these paths container-only
      - /workspace/.venv
      - /workspace/__pycache__

      # AI Agent Persistence
      - ${HOME}/.gemini-docker-config:/root/.gemini
      - ${HOME}/.gemini-docker-config:/root/.config/google-gemini-cli
      - ${HOME}/.claude-docker-config:/root/.claude
    stdin_open: true
    tty: true
